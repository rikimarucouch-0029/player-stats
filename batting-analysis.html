<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Segoe UI",sans-serif;min-height:100vh;}
.toolbar{background:#16213e;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.toolbar h1{font-size:18px;font-weight:700;}
.toolbar a{color:#e94560;text-decoration:none;font-size:14px;}
.filters{padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;background:#16213e88;}
.filter-group{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.filter-group label{font-size:12px;color:rgba(255,255,255,.5);margin-right:4px;}
.fbtn{padding:6px 14px;border:none;border-radius:20px;font-size:13px;cursor:pointer;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);transition:.2s;}
.fbtn.active{color:#fff;font-weight:600;}
.fbtn.team-a.active{background:#2196f3;}
.fbtn.team-b.active{background:#4caf50;}
.fbtn.team-c.active{background:#ff9800;}
.fbtn.cat-hit.active{background:#4caf50;}
.fbtn.cat-out.active{background:#ef5350;}
.fbtn.cat-error.active{background:#ffeb3b;color:#333;}
.fbtn.cat-walk.active{background:#42a5f5;}
.fbtn.cat-sac.active{background:#ab47bc;}
.fbtn.cat-hr.active{background:#ff5722;}
.fbtn.cat-fc.active{background:#ff9800;}
.fbtn.cat-so.active{background:#e91e63;}
.main{display:flex;gap:16px;padding:16px;max-width:1200px;margin:0 auto;}
.chart-wrap{flex:1;min-width:0;}
.chart-wrap svg{width:100%;height:auto;display:block;}
.stats-wrap{width:320px;display:flex;flex-direction:column;gap:12px;}
.card{background:rgba(255,255,255,.08);border-radius:10px;padding:14px;}
.card h3{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:8px;}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,.06);}
.stat-row:last-child{border:none;}
.stat-val{font-weight:700;color:#e94560;}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:rgba(255,255,255,.6);}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.dir-bar{display:flex;align-items:center;gap:8px;margin:3px 0;}
.dir-label{width:60px;font-size:12px;text-align:right;color:rgba(255,255,255,.5);}
.dir-bar-bg{flex:1;height:16px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
.dir-bar-fill{height:100%;border-radius:4px;transition:width .3s;}
.dir-bar-val{font-size:12px;width:30px;color:rgba(255,255,255,.7);}
select{background:#16213e;color:#eee;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 10px;font-size:13px;}
@media(max-width:768px){
  .main{flex-direction:column;}
  .stats-wrap{width:100%;}
}
</style>

// ========== 座標マッピング ==========
const POSITIONS = {
  pitcher:  {x:200,y:240},
  catcher:  {x:200,y:360},
  first:    {x:280,y:230},
  second:   {x:240,y:200},
  short:    {x:160,y:200},
  third:    {x:120,y:230},
  left:     {x:80,y:100},
  center:   {x:200,y:60},
  right:    {x:320,y:100},
};

function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}

function getPos(ab,idx){
  if(!ab.dir) return null;
  const base=POSITIONS[ab.dir];
  if(!base) return null;
  const seed=hash(ab.name+idx);
  const jx=((seed%21)-10)*1.5;
  const jy=(((seed>>4)%21)-10)*1.5;
  let x=base.x+jx, y=base.y+jy;
  if(ab.type==='fly'&&['left','center','right'].includes(ab.dir)){y-=15;}
  if(ab.type==='ground'&&['left','center','right'].includes(ab.dir)){y+=20;}
  return {x,y};
}

// ========== 色設定 ==========
const CAT_COLORS = {
  hit:'#4caf50', hr:'#ff5722', out:'#ef5350', so:'#e91e63',
  error:'#ffeb3b', walk:'#42a5f5', hbp:'#42a5f5', sac:'#ab47bc', fc:'#ff9800'
};
const CAT_LABELS = {
  hit:'安打', hr:'本塁打', out:'アウト', so:'三振',
  error:'エラー', walk:'四球', hbp:'死球', sac:'犠打', fc:'FC'
};

// ========== フィルター状態 ==========
let activeTeams = new Set(['A','B','C']);
let activeCats = new Set(Object.keys(CAT_COLORS));
let activePlayer = 'all';
let activeGame = 'all';
let highlightPlayer = null;

// ========== フィルターUI ==========
function renderFilters(){
  const el=document.getElementById('filters');
  let html='';
  html+='<div class="filter-group"><label>チーム</label>';
  [{k:'A',cls:'team-a'},{k:'B',cls:'team-b'},{k:'C',cls:'team-c'}].forEach(t=>{
    html+=`<button class="fbtn ${t.cls}${activeTeams.has(t.k)?' active':''}" onclick="toggleTeam('${t.k}')">${t.k}</button>`;
  });
  html+='</div>';
  html+='<div class="filter-group"><label>結果</label>';
  Object.entries(CAT_LABELS).forEach(([k,v])=>{
    html+=`<button class="fbtn cat-${k}${activeCats.has(k)?' active':''}" onclick="toggleCat('${k}')">${v}</button>`;
  });
  html+='</div>';
  // player select
  const players=[...new Set(AT_BATS.filter(a=>activeTeams.has(a.team)).map(a=>a.name))].sort();
  html+='<div class="filter-group"><label>選手</label><select onchange="setPlayer(this.value)"><option value="all">全員</option>';
  players.forEach(p=>{html+=`<option value="${p}"${activePlayer===p?' selected':''}>${p}</option>`;});
  html+='</select></div>';
  // game select
  const games=[...new Set(AT_BATS.filter(a=>activeTeams.has(a.team)).map(a=>a.game))];
  html+='<div class="filter-group"><label>試合</label><select onchange="setGame(this.value)"><option value="all">全試合</option>';
  games.forEach(g=>{html+=`<option value="${g}"${activeGame===g?' selected':''}>${g}</option>`;});
  html+='</select></div>';
  el.innerHTML=html;
}

function toggleTeam(t){activeTeams.has(t)?activeTeams.delete(t):activeTeams.add(t);activePlayer='all';activeGame='all';render();}
function toggleCat(c){activeCats.has(c)?activeCats.delete(c):activeCats.add(c);render();}
function setPlayer(p){activePlayer=p;highlightPlayer=null;render();}
function setGame(g){activeGame=g;render();}

// ========== フィルター適用 ==========
function filtered(){
  return AT_BATS.filter(a=>{
    if(!activeTeams.has(a.team)) return false;
    if(!activeCats.has(a.cat)) return false;
    if(activePlayer!=='all'&&a.name!==activePlayer) return false;
    if(activeGame!=='all'&&a.game!==activeGame) return false;
    return true;
  });
}

// ========== SVG描画 ==========
function renderChart(){
  const data=filtered();
  let svg=`<svg viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">`;
  // フィールド
  svg+=`<defs><clipPath id="field"><path d="M200,370 L20,120 A250,250,0,0,1,380,120 Z"/></clipPath></defs>`;
  svg+=`<rect x="0" y="0" width="400" height="420" fill="#1a1a2e"/>`;
  // 外野芝
  svg+=`<path d="M200,370 L20,120 A250,250,0,0,1,380,120 Z" fill="#1a3a1a" stroke="#2a5a2a" stroke-width="1"/>`;
  // 内野
  svg+=`<polygon points="200,280 270,230 200,180 130,230" fill="#3a2a1a" stroke="#5a4a3a" stroke-width="1"/>`;
  // ファウルライン
  svg+=`<line x1="200" y1="370" x2="20" y2="60" stroke="rgba(255,255,255,.15)" stroke-width="1"/>`;
  svg+=`<line x1="200" y1="370" x2="380" y2="60" stroke="rgba(255,255,255,.15)" stroke-width="1"/>`;
  // ベース
  svg+=`<rect x="196" y="276" width="8" height="8" fill="white" transform="rotate(45,200,280)"/>`;// ホーム
  svg+=`<rect x="266" y="226" width="7" height="7" fill="white" transform="rotate(45,270,230)"/>`;// 1塁
  svg+=`<rect x="196" y="176" width="7" height="7" fill="white" transform="rotate(45,200,180)"/>`;// 2塁
  svg+=`<rect x="126" y="226" width="7" height="7" fill="white" transform="rotate(45,130,230)"/>`;// 3塁
  // マウンド
  svg+=`<circle cx="200" cy="240" r="4" fill="#5a4a3a" stroke="#7a6a5a"/>`;

  // ドット
  data.forEach((ab,i)=>{
    const pos=getPos(ab,i);
    if(!pos) return;
    const col=CAT_COLORS[ab.cat]||'#888';
    const opacity=(highlightPlayer&&ab.name!==highlightPlayer)?0.15:0.8;
    const r=(highlightPlayer===ab.name)?9:7;
    svg+=`<circle cx="${pos.x}" cy="${pos.y}" r="${r}" fill="${col}" opacity="${opacity}" stroke="rgba(0,0,0,.3)" stroke-width="1" class="dot" data-name="${ab.name}" data-result="${ab.result}">
      <title>#${ab.num} ${ab.name}\n${ab.result}</title></circle>`;
  });

  // 四球・死球カウント（フィールド外表示）
  const walks=data.filter(a=>a.cat==='walk'||a.cat==='hbp').length;
  if(walks>0){
    svg+=`<text x="200" y="400" text-anchor="middle" fill="#42a5f5" font-size="12">四死球: ${walks}</text>`;
  }
  svg+=`</svg>`;
  document.getElementById('chartWrap').innerHTML=svg;

  // ドットクリックイベント
  document.querySelectorAll('.dot').forEach(d=>{
    d.style.cursor='pointer';
    d.addEventListener('click',()=>{
      const name=d.getAttribute('data-name');
      highlightPlayer=highlightPlayer===name?null:name;
      render();
    });
  });
}

// ========== 統計 ==========
function renderStats(){
  const data=filtered();
  const pa=data.length;
  const ab=data.filter(a=>!['walk','hbp','sac'].includes(a.cat)).length;
  const hits=data.filter(a=>a.cat==='hit'||a.cat==='hr').length;
  const avg=ab>0?(hits/ab):0;

  let html='';
  // 基本成績
  html+=`<div class="card"><h3>基本成績</h3>`;
  html+=`<div class="stat-row"><span>打席数</span><span class="stat-val">${pa}</span></div>`;
  html+=`<div class="stat-row"><span>打数</span><span class="stat-val">${ab}</span></div>`;
  html+=`<div class="stat-row"><span>安打</span><span class="stat-val">${hits}</span></div>`;
  html+=`<div class="stat-row"><span>打率</span><span class="stat-val">${ab>0?avg.toFixed(3):'---'}</span></div>`;
  html+=`</div>`;

  // 結果内訳
  html+=`<div class="card"><h3>結果内訳</h3>`;
  Object.entries(CAT_LABELS).forEach(([k,v])=>{
    const cnt=data.filter(a=>a.cat===k).length;
    if(cnt>0){
      const pct=pa>0?((cnt/pa)*100).toFixed(0):'0';
      html+=`<div class="stat-row"><span style="display:flex;align-items:center;gap:6px"><span class="legend-dot" style="background:${CAT_COLORS[k]}"></span>${v}</span><span class="stat-val">${cnt} (${pct}%)</span></div>`;
    }
  });
  html+=`</div>`;

  // 打球方向
  const dirData=data.filter(a=>a.dir&&a.dir!=='catcher');
  if(dirData.length>0){
    html+=`<div class="card"><h3>打球方向</h3>`;
    const dirs=['left','center','right','third','short','second','first','pitcher'];
    const dirLabels={left:'レフト',center:'センター',right:'ライト',third:'サード',short:'ショート',second:'セカンド',first:'ファースト',pitcher:'ピッチャー'};
    const maxDir=Math.max(...dirs.map(d=>dirData.filter(a=>a.dir===d).length),1);
    dirs.forEach(d=>{
      const cnt=dirData.filter(a=>a.dir===d).length;
      if(cnt>0){
        const pct=(cnt/maxDir)*100;
        const hitCnt=dirData.filter(a=>a.dir===d&&(a.cat==='hit'||a.cat==='hr')).length;
        html+=`<div class="dir-bar">
          <span class="dir-label">${dirLabels[d]}</span>
          <div class="dir-bar-bg"><div class="dir-bar-fill" style="width:${pct}%;background:${hitCnt>0?'#4caf50':'#ef5350'}"></div></div>
          <span class="dir-bar-val">${cnt}</span>
        </div>`;
      }
    });
    html+=`</div>`;

    // ゴロ/フライ比率
    const ground=dirData.filter(a=>a.type==='ground').length;
    const fly=dirData.filter(a=>a.type==='fly').length;
    const bunt=dirData.filter(a=>a.type==='bunt').length;
    const line=dirData.filter(a=>a.type==='line').length;
    if(ground+fly+bunt+line>0){
      html+=`<div class="card"><h3>打球種別</h3>`;
      if(ground)html+=`<div class="stat-row"><span>ゴロ</span><span class="stat-val">${ground}</span></div>`;
      if(fly)html+=`<div class="stat-row"><span>フライ</span><span class="stat-val">${fly}</span></div>`;
      if(line)html+=`<div class="stat-row"><span>ライナー</span><span class="stat-val">${line}</span></div>`;
      if(bunt)html+=`<div class="stat-row"><span>バント</span><span class="stat-val">${bunt}</span></div>`;
      const gbfb=fly>0?(ground/fly):0;
      html+=`<div class="stat-row"><span>GB/FB比</span><span class="stat-val">${fly>0?gbfb.toFixed(2):'---'}</span></div>`;
      html+=`</div>`;
    }
  }

  // レジェンド
  html+=`<div class="card"><h3>凡例</h3><div class="legend">`;
  Object.entries(CAT_LABELS).forEach(([k,v])=>{
    html+=`<div class="legend-item"><span class="legend-dot" style="background:${CAT_COLORS[k]}"></span>${v}</div>`;
  });
  html+=`</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px">ドットクリックで選手ハイライト</div></div>`;

  document.getElementById('statsWrap').innerHTML=html;
}

function render(){renderFilters();renderChart();renderStats();}
render();
</script>
</body>
</html>
