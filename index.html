<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>選手成績管理</title>
<style>
/* ========== リセット・基本設定 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Segoe UI", sans-serif;
  background: #1a1a2e;
  color: #333;
}

/* ========== 全画面レイアウト ========== */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ========== ツールバー ========== */
.toolbar-top {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: #16213e;
  flex-shrink: 0;
}
.toolbar-top .spacer { flex: 1; }
.page-title {
  font-size: .9rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: .5px;
}
.tb {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 6px 12px;
  border: 1.5px solid rgba(255,255,255,.2);
  border-radius: 6px;
  background: rgba(255,255,255,.08);
  font-size: .75rem;
  font-weight: 600;
  color: rgba(255,255,255,.85);
  cursor: pointer;
  transition: all .12s;
  min-height: 36px;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
  font-family: inherit;
}
.tb:active { transform: scale(.95); opacity: .8; }
.tb:hover { background: rgba(255,255,255,.15); }

/* ========== メインタブ ========== */
.main-tabs {
  display: flex;
  background: #16213e;
  border-top: 1px solid rgba(255,255,255,.08);
  flex-shrink: 0;
}
.main-tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.4);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  border-bottom: 3px solid transparent;
  font-family: inherit;
}
.main-tab.active {
  color: #fff;
  border-bottom-color: #e94560;
  background: rgba(255,255,255,.04);
}
.main-tab:hover:not(.active) { color: rgba(255,255,255,.65); }

/* ========== リーグバー ========== */
.league-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  background: #0f3460;
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.league-btn {
  padding: 5px 14px;
  border: 1.5px solid rgba(255,255,255,.15);
  border-radius: 16px;
  background: transparent;
  color: rgba(255,255,255,.5);
  font-size: .73rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  font-family: inherit;
}
.league-btn:hover { color: rgba(255,255,255,.8); background: rgba(255,255,255,.06); }
.league-btn.active { color: #fff; background: #e94560; border-color: #e94560; }
.league-btn.total { border-style: dashed; }
.league-btn.total.active { background: #533483; border-color: #7c4dff; border-style: solid; }
.league-add-btn {
  padding: 4px 10px;
  border: 1.5px dashed rgba(255,255,255,.25);
  border-radius: 16px;
  background: transparent;
  color: rgba(255,255,255,.4);
  font-size: .75rem;
  cursor: pointer;
  font-family: inherit;
}
.league-add-btn:hover { color: rgba(255,255,255,.7); }

/* ========== コンテンツエリア ========== */
.content-area {
  flex: 1;
  overflow: hidden;
  padding: 10px;
  display: flex;
  flex-direction: column;
}
.page { display: none; }
.page.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.page#pageRoster.active { overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ========== 名簿カード ========== */
.roster-tournament {
  margin-bottom: 16px;
}
.roster-tournament-title {
  font-size: .85rem;
  font-weight: 700;
  color: #fff;
  padding: 8px 12px;
  background: rgba(255,255,255,.08);
  border-radius: 8px;
  margin-bottom: 8px;
}
.roster-team {
  margin-bottom: 12px;
}
.roster-team-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  margin-bottom: 6px;
}
.team-color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.roster-team-name {
  font-size: .78rem;
  font-weight: 600;
  color: rgba(255,255,255,.8);
}
.roster-team-count {
  font-size: .65rem;
  color: rgba(255,255,255,.4);
}
.player-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 6px;
  padding: 0 4px;
}
.player-card {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: rgba(255,255,255,.08);
  border-radius: 6px;
  cursor: default;
  transition: all .1s;
  border-left: 3px solid #555;
  color: #fff;
}
.player-card.grade-3 { border-left-color: #e94560; background: rgba(233,69,96,.22); }
.player-card.grade-2 { border-left-color: #2196f3; background: rgba(33,150,243,.22); }
.player-card.grade-1 { border-left-color: #4caf50; background: rgba(76,175,80,.22); }
.player-card.grade-captain { border-left-color: #ff9800; background: rgba(255,152,0,.22); }
.grade-legend {
  display: flex;
  gap: 12px;
  padding: 6px 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.grade-legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: .65rem;
  color: rgba(255,255,255,.6);
}
.grade-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}
.player-card:hover { background: rgba(255,255,255,.18); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.player-num {
  font-size: .9rem;
  font-weight: 800;
  color: #fff;
  min-width: 22px;
  text-align: center;
}
.player-name {
  font-size: .68rem;
  font-weight: 600;
  color: rgba(255,255,255,.9);
  line-height: 1.2;
}
.staff-section {
  margin-top: 4px;
  padding: 0 4px;
}
.staff-cards {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.staff-card {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: rgba(255,255,255,.15);
  border-radius: 4px;
  font-size: .63rem;
  color: rgba(255,255,255,.6);
}
.staff-num { font-weight: 700; }

/* ========== テーブルアクション ========== */
.table-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}

/* ========== テーブル ========== */
.table-scroll {
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: 8px;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
  flex: 1;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  min-width: 900px;
  font-size: .8rem;
}
thead th {
  background: #16213e;
  color: rgba(255,255,255,.9);
  padding: 8px 4px;
  font-size: .7rem;
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 10;
  white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,.1);
  user-select: none;
}
thead th:last-child { border-right: none; }
tbody td {
  padding: 2px 4px;
  border-bottom: 1px solid #e8e8e8;
  border-right: 1px solid #f0f0f0;
  text-align: center;
  min-width: 42px;
  height: 36px;
}
tbody td:last-child { border-right: none; }
tbody tr:hover { filter: brightness(1.05); }
tbody tr.row-grade-3 { background: rgba(233,69,96,.12); }
tbody tr.row-grade-3:nth-child(even) { background: rgba(233,69,96,.18); }
tbody tr.row-grade-2 { background: rgba(33,150,243,.12); }
tbody tr.row-grade-2:nth-child(even) { background: rgba(33,150,243,.18); }
tbody tr.row-grade-1 { background: rgba(76,175,80,.12); }
tbody tr.row-grade-1:nth-child(even) { background: rgba(76,175,80,.18); }
tbody tr.row-grade-captain { background: rgba(255,152,0,.12); }
tbody tr.row-grade-captain:nth-child(even) { background: rgba(255,152,0,.18); }
.col-name { min-width: 100px; text-align: left; padding-left: 8px !important; position: sticky; left: 0; z-index: 5; }
thead th.col-name { z-index: 15; background: #16213e; }
tbody td.col-name { background: #fff; }
tbody tr.row-grade-3 td.col-name { background: #fce4e8; }
tbody tr.row-grade-3:nth-child(even) td.col-name { background: #f9d2d8; }
tbody tr.row-grade-2 td.col-name { background: #e0eefa; }
tbody tr.row-grade-2:nth-child(even) td.col-name { background: #d1e6f7; }
tbody tr.row-grade-1 td.col-name { background: #e2f3e3; }
tbody tr.row-grade-1:nth-child(even) td.col-name { background: #d3eed4; }
tbody tr.row-grade-captain td.col-name { background: #fef0dc; }
tbody tr.row-grade-captain:nth-child(even) td.col-name { background: #fde6c8; }
.col-number { min-width: 44px; }
.col-calc { background: #eef2ff !important; font-weight: 700; color: #16213e; }
.col-delete { width: 36px; min-width: 36px; padding: 0 !important; }
td.editable { cursor: cell; }
td.editable:hover { background: #fff3cd !important; }
td.editing { padding: 0 !important; background: #fff !important; box-shadow: inset 0 0 0 2px #e94560; }
td.editing input {
  width: 100%;
  height: 100%;
  min-height: 34px;
  border: none;
  outline: none;
  text-align: center;
  font-size: .8rem;
  font-family: inherit;
  padding: 4px;
  background: transparent;
}
td.col-name.editing input { text-align: left; padding-left: 8px; }
.delete-btn {
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px 8px;
  border-radius: 4px;
  transition: all .12s;
  font-family: inherit;
  line-height: 1;
}
.delete-btn:hover { background: #ffebee; color: #c62828; }

/* ========== 非表示 ========== */
.hidden { display: none !important; }

/* ========== ダイアログ・オーバーレイ ========== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }
.dialog {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  width: 320px;
  max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
.dialog h3 { font-size: .95rem; margin-bottom: 12px; color: #16213e; }
.dialog input[type="text"] {
  width: 100%;
  padding: 8px 12px;
  border: 1.5px solid #ccc;
  border-radius: 6px;
  font-size: .85rem;
  font-family: inherit;
  outline: none;
}
.dialog input:focus { border-color: #e94560; }
.dialog-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.dialog-btn {
  padding: 7px 16px;
  border: none;
  border-radius: 6px;
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.dialog-btn.cancel { background: #eee; color: #555; }
.dialog-btn.ok { background: #e94560; color: #fff; }
.dialog-btn.danger { background: #c62828; color: #fff; }

/* ========== 選手ピッカー ========== */
.picker-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 200;
  flex-direction: column;
}
.picker-overlay.show { display: flex; }
.picker-panel {
  background: #1a1a2e;
  margin: auto;
  width: 95vw;
  max-width: 600px;
  max-height: 85vh;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}
.picker-header {
  padding: 12px 14px;
  background: #16213e;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.picker-header h3 { font-size: .85rem; color: #fff; flex: 1; }
.picker-close {
  background: none;
  border: none;
  color: rgba(255,255,255,.6);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 4px 8px;
  font-family: inherit;
}
.picker-search {
  margin: 8px 12px;
  padding: 8px 12px;
  border: 1.5px solid rgba(255,255,255,.15);
  border-radius: 8px;
  background: rgba(255,255,255,.06);
  color: #fff;
  font-size: .82rem;
  font-family: inherit;
  outline: none;
  flex-shrink: 0;
}
.picker-search::placeholder { color: rgba(255,255,255,.35); }
.picker-search:focus { border-color: #e94560; }
.picker-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px 14px;
}
.picker-team-section { margin-bottom: 10px; }
.picker-team-label {
  font-size: .7rem;
  font-weight: 600;
  color: rgba(255,255,255,.5);
  padding: 2px 4px;
  margin-bottom: 4px;
}
.picker-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 5px;
}
.picker-card {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 8px;
  background: rgba(255,255,255,.08);
  border-radius: 6px;
  cursor: pointer;
  transition: all .1s;
  border-left: 3px solid #555;
  color: #fff;
}
.picker-card:hover { background: rgba(255,255,255,.18); transform: scale(1.03); box-shadow: 0 2px 8px rgba(0,0,0,.4); }
.picker-card.already-added { opacity: .3; pointer-events: none; }
.picker-card.grade-3 { border-left-color: #e94560; background: rgba(233,69,96,.22); }
.picker-card.grade-2 { border-left-color: #2196f3; background: rgba(33,150,243,.22); }
.picker-card.grade-1 { border-left-color: #4caf50; background: rgba(76,175,80,.22); }
.picker-card.grade-captain { border-left-color: #ff9800; background: rgba(255,152,0,.22); }
.picker-card .player-num { font-size: .85rem; color: #fff; }
.picker-card .player-name { font-size: .68rem; color: rgba(255,255,255,.9); }
.picker-manual {
  margin-top: 10px;
  text-align: center;
}
.picker-manual button {
  padding: 8px 20px;
  border: 1.5px dashed rgba(255,255,255,.3);
  border-radius: 8px;
  background: transparent;
  color: rgba(255,255,255,.5);
  font-size: .75rem;
  cursor: pointer;
  font-family: inherit;
}
.picker-manual button:hover { color: rgba(255,255,255,.8); border-color: rgba(255,255,255,.5); }

/* ========== ランキング ========== */
.ranking-cats {
  display: flex; gap: 4px; padding: 8px 10px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; flex-shrink: 0;
}
.rank-cat {
  padding: 6px 14px; border: none; border-radius: 16px;
  background: rgba(255,255,255,.1); color: rgba(255,255,255,.6);
  font-size: .75rem; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit;
}
.rank-cat.active { background: #e94560; color: #fff; }
.rank-list { padding: 8px; flex: 1; overflow-y: auto; }
.rank-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: rgba(255,255,255,.06); border-radius: 8px; margin-bottom: 6px;
  cursor: pointer; transition: background .12s;
}
.rank-item:hover { background: rgba(255,255,255,.12); }
.rank-pos {
  font-size: 1.1rem; font-weight: 800; color: #e94560; min-width: 28px; text-align: center;
}
.rank-pos.gold { color: #ffd700; }
.rank-pos.silver { color: #c0c0c0; }
.rank-pos.bronze { color: #cd7f32; }
.rank-info { flex: 1; }
.rank-name { font-size: .85rem; font-weight: 700; color: #fff; }
.rank-sub { font-size: .68rem; color: rgba(255,255,255,.5); }
.rank-val { font-size: 1rem; font-weight: 800; color: #fff; min-width: 45px; text-align: right; }
.rank-bar-wrap { flex: 1; height: 22px; background: rgba(255,255,255,.06); border-radius: 4px; position: relative; overflow: visible; }
.rank-bar { height: 100%; border-radius: 4px; transition: width .3s; }
.rank-bar.above { background: linear-gradient(90deg, #4caf50, #66bb6a); }
.rank-bar.below { background: linear-gradient(90deg, #e94560, #ef5350); }
.rank-bar.equal { background: rgba(255,255,255,.2); }
.rank-avg-line {
  position: absolute; top: -4px; bottom: -4px; width: 2px;
  background: #ffd700; z-index: 5;
}
.rank-avg-label {
  position: absolute; top: -16px; font-size: .55rem; color: #ffd700;
  white-space: nowrap; transform: translateX(-50%);
}
.rank-bottom { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
.rank-bar-row { display: flex; align-items: center; gap: 8px; }

/* ========== 選手詳細モーダル ========== */
.player-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000;
  display: none; align-items: center; justify-content: center; padding: 16px;
}
.player-modal-overlay.show { display: flex; }
.player-modal {
  background: #1a1a2e; border-radius: 12px; width: 100%; max-width: 420px;
  max-height: 85vh; overflow-y: auto; padding: 20px;
}
.pm-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.pm-name { font-size: 1.1rem; font-weight: 800; color: #fff; }
.pm-number { font-size: .8rem; color: rgba(255,255,255,.5); margin-left: 8px; }
.pm-close {
  background: none; border: none; color: rgba(255,255,255,.5); font-size: 1.3rem; cursor: pointer;
}
.pm-section { margin-bottom: 16px; }
.pm-section-title {
  font-size: .75rem; font-weight: 700; color: #e94560; margin-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,.1); padding-bottom: 4px;
}
.pm-bar-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.pm-bar-label { font-size: .7rem; color: rgba(255,255,255,.7); min-width: 50px; text-align: right; }
.pm-bar-wrap { flex: 1; height: 18px; background: rgba(255,255,255,.08); border-radius: 4px; position: relative; overflow: hidden; }
.pm-bar { height: 100%; border-radius: 4px; transition: width .3s; position: absolute; left: 0; top: 0; }
.pm-bar.player { background: #e94560; z-index: 2; }
.pm-bar.team { background: rgba(255,255,255,.2); z-index: 1; }
.pm-bar.grade { background: rgba(33,150,243,.4); z-index: 1; }
.pm-bar-val { font-size: .68rem; color: rgba(255,255,255,.8); min-width: 40px; text-align: left; }
.pm-legend {
  display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;
}
.pm-legend-item { display: flex; align-items: center; gap: 4px; font-size: .65rem; color: rgba(255,255,255,.6); }
.pm-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* ========== モバイル対応 ========== */
@media (max-width: 600px) {
  .toolbar-top { padding: 6px 8px; }
  .page-title { font-size: .8rem; }
  .player-cards { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); }
  table { min-width: 780px; font-size: .72rem; }
  thead th { font-size: .65rem; padding: 6px 2px; }
  tbody td { min-width: 36px; height: 32px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar-top">
    <span class="page-title">選手成績管理</span>
    <div class="spacer"></div>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" onclick="switchPage('roster')">名簿</button>
    <button class="main-tab" onclick="switchPage('batting')">打撃成績</button>
    <button class="main-tab" onclick="switchPage('pitching')">投手成績</button>
    <button class="main-tab" onclick="switchPage('fielding')">守備成績</button>
    <button class="main-tab" onclick="switchPage('ranking')">ランキング</button>
  </div>

  <!-- リーグバー（成績ページのみ） -->
  <div class="league-bar hidden" id="leagueBar"></div>

  <div class="content-area">
    <!-- 名簿ページ -->
    <div class="page active" id="pageRoster"></div>

    <!-- 打撃成績ページ -->
    <div class="page" id="pageBatting">
      <div class="table-actions" id="battingActions"></div>
      <div class="table-scroll">
        <table><thead><tr id="battingHead"></tr></thead><tbody id="battingBody"></tbody></table>
      </div>
    </div>

    <!-- 投手成績ページ -->
    <div class="page" id="pagePitching">
      <div class="table-actions" id="pitchingActions"></div>
      <div class="table-scroll">
        <table><thead><tr id="pitchingHead"></tr></thead><tbody id="pitchingBody"></tbody></table>
      </div>
    </div>

    <!-- 守備成績ページ -->
    <div class="page" id="pageFielding">
      <div class="table-actions" id="fieldingActions"></div>

// ========== localStorage ==========
function loadData() {
  try {
    const s = JSON.parse(localStorage.getItem(SK));
    if (s && s.leagues) { leagues = s.leagues; activeLeague = s.activeLeague; }
  } catch(e) {}
  // INITIAL_STATSに存在して、まだ未作成のリーグを自動追加
  Object.entries(INITIAL_STATS).forEach(([name, data]) => {
    if (!leagues.find(l => l.name === name)) {
      const lg = mkLeague(name);
      if (data.batting)  lg.batting  = data.batting.map(r  => ({id:genId(), ...r}));
      if (data.pitching) lg.pitching = data.pitching.map(r => ({id:genId(), ...r}));
      if (data.fielding) lg.fielding = data.fielding.map(r => ({id:genId(), ...r}));
      leagues.push(lg);
    }
  });
  if (!leagues.length) {
    const lg = mkLeague('リーグ1');
    leagues.push(lg);
    activeLeague = lg.id;
    saveData();
  }
  if (!activeLeague || !getLeague(activeLeague)) activeLeague = leagues[0].id;
}
function saveData() { localStorage.setItem(SK, JSON.stringify({leagues,activeLeague})); }

// INITIAL_STATSを強制読み込み（既存データを上書き）
function loadFromFile() {
  if (!Object.keys(INITIAL_STATS).length) { alert('INITIAL_STATSにデータがありません。\nindex.htmlのINITIAL_STATS定数を編集してください。'); return; }
  if (!confirm('INITIAL_STATSのデータで上書きします。\n（同名リーグは上書き、未登録リーグは追加）\nよろしいですか？')) return;
  Object.entries(INITIAL_STATS).forEach(([name, data]) => {
    let lg = leagues.find(l => l.name === name);
    if (!lg) { lg = mkLeague(name); leagues.push(lg); }
    if (data.batting)  lg.batting  = data.batting.map(r  => ({id:genId(), ...r}));
    if (data.pitching) lg.pitching = data.pitching.map(r => ({id:genId(), ...r}));
    if (data.fielding) lg.fielding = data.fielding.map(r => ({id:genId(), ...r}));
  });
  if (!activeLeague || !getLeague(activeLeague)) activeLeague = leagues[0]?.id;
  saveData(); renderLeagueBar(); renderAll(); updateActions();
  alert('読み込み完了しました。');
}

// ========== ユーティリティ ==========
function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
function mkLeague(name) { return {id:genId(),name,batting:[],pitching:[],fielding:[]}; }
function getLeague(id) { return leagues.find(l=>l.id===id); }
function isTotal() { return activeLeague===TOTAL_ID; }

function parseIP(v){const p=String(v).split('.');return(parseInt(p[0])||0)+(p.length>1?(parseInt(p[1][0])||0)/3:0);}
function sanitizeIP(v){const s=String(v).trim();if(!s||s==='0')return 0;const p=s.split('.');const w=Math.max(0,parseInt(p[0])||0);if(p.length<2)return w;let f=parseInt(p[1][0])||0;if(f>2)f=2;return parseFloat(w+'.'+f);}

function calcBat(r){
  const ab=r.ab||0,h=r.h||0,h2b=r.h2b||0,h3b=r.h3b||0,hr=r.hr||0,bb=r.bb||0,hbp=r.hbp||0,sf=r.sf||0;
  const s1=h-h2b-h3b-hr, avg=ab>0?h/ab:null, od=ab+bb+hbp+sf;
  const obp=od>0?(h+bb+hbp)/od:null, tb=s1+2*h2b+3*h3b+4*hr, slg=ab>0?tb/ab:null;
  return{avg,obp,slg,ops:obp!=null&&slg!=null?obp+slg:null};
}
function calcPit(r){
  const ip=parseIP(r.ip||0);
  return{era:ip>0?((r.er||0)/ip)*9:null,whip:ip>0?((r.ha||0)+(r.bba||0))/ip:null,k9:ip>0?((r.k||0)/ip)*9:null};
}
function fmtRate(v){if(v==null||isNaN(v)||!isFinite(v))return'---';return v>=1?v.toFixed(3):v.toFixed(3).substring(1);}
function fmtCalc(k,v){if(v==null||isNaN(v)||!isFinite(v))return'---';if(['avg','obp','slg'].includes(k))return fmtRate(v);if(k==='ops')return v.toFixed(3);return v.toFixed(2);}

function getCurrentData(){
  if(isTotal()) return getTotalData();
  const lg=getLeague(activeLeague);
  return lg?{batting:lg.batting,pitching:lg.pitching,fielding:lg.fielding||[]}:{batting:[],pitching:[],fielding:[]};
}
function getTotalData(){
  const bm={},pm={},fm={};
  leagues.forEach(lg=>{
    lg.batting.forEach(r=>{
      const k=r.name;if(!k)return;
      if(!bm[k]){bm[k]={id:'t_'+k,name:r.name,number:r.number};BAT_SUM.forEach(x=>bm[k][x]=0);}
      BAT_SUM.forEach(x=>bm[k][x]+=(r[x]||0));
    });
    lg.pitching.forEach(r=>{
      const k=r.name;if(!k)return;
      if(!pm[k]){pm[k]={id:'t_'+k,name:r.name,number:r.number,_ip:0};PIT_SUM.forEach(x=>pm[k][x]=0);}
      PIT_SUM.forEach(x=>pm[k][x]+=(r[x]||0));pm[k]._ip+=parseIP(r.ip||0);
    });
    (lg.fielding||[]).forEach(r=>{
      const k=r.name;if(!k)return;
      if(!fm[k]){fm[k]={id:'t_'+k,name:r.name,number:r.number};FIELD_SUM.forEach(x=>fm[k][x]=0);}
      FIELD_SUM.forEach(x=>fm[k][x]+=(r[x]||0));
    });
  });
  Object.values(pm).forEach(r=>{const w=Math.floor(r._ip);let f=Math.round((r._ip-w)*3);r.ip=f>=3?(w+1):parseFloat(w+'.'+f);delete r._ip;});
  return{batting:Object.values(bm),pitching:Object.values(pm),fielding:Object.values(fm)};
}

function getAllPlayers(){
  const map={};
  ROSTER.forEach(t=>t.teams.forEach(tm=>tm.players.forEach(p=>{

    map[k].teams.push({team:tm.name,color:tm.color,number:p.n});
  })));
  return Object.values(map);
}

  if(n>=55) return 'grade-1';

}

// 平均より上=緑、下=赤にするキー (higher=good / lower=good)
const HIGHER_GOOD_BAT = ['h','h2b','h3b','hr','rbi','bb','sb','hbp','sac','sf'];
const LOWER_GOOD_BAT = ['so'];
const HIGHER_GOOD_BAT_CALC = ['avg','obp','slg','ops'];
const HIGHER_GOOD_PIT = ['g','w','sv','k'];
const LOWER_GOOD_PIT = ['l','ha','hra','bba','er'];
const LOWER_GOOD_PIT_CALC = ['era','whip'];
const HIGHER_GOOD_PIT_CALC = ['k9'];

function calcTeamAvg(data,tt){
  const avg={};
  if(!data.length)return avg;
  const cols=tt==='batting'?BATTING_COLS:tt==='pitching'?PITCHING_COLS:FIELDING_COLS;
  cols.forEach(col=>{
    if(col.type==='text')return;
    if(col.type==='calc'){
      const vals=data.map(r=>{const s=tt==='batting'?calcBat(r):tt==='pitching'?calcPit(r):{};return s[col.key];}).filter(v=>v!=null&&!isNaN(v)&&isFinite(v));
      avg[col.key]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    } else if(col.type==='ip'){
      const vals=data.map(r=>parseIP(r[col.key]||0));
      avg[col.key]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
    } else {
      avg[col.key]=data.reduce((s,r)=>s+(r[col.key]||0),0)/data.length;
    }
  });
  return avg;
}

function getCompareColor(key,val,teamAvg,tt){
  if(teamAvg==null||val==null||isNaN(val)||!isFinite(val))return '';
  let isHigherGood=false,isLowerGood=false;
  if(tt==='batting'){
    if(HIGHER_GOOD_BAT.includes(key)||HIGHER_GOOD_BAT_CALC.includes(key))isHigherGood=true;
    if(LOWER_GOOD_BAT.includes(key))isLowerGood=true;
  } else if(tt==='pitching'){
    if(HIGHER_GOOD_PIT.includes(key)||HIGHER_GOOD_PIT_CALC.includes(key))isHigherGood=true;
    if(LOWER_GOOD_PIT.includes(key)||LOWER_GOOD_PIT_CALC.includes(key))isLowerGood=true;
  } else if(tt==='fielding'){
    if(key==='e')isLowerGood=true;
  }
  if(!isHigherGood&&!isLowerGood)return '';
  if(val===teamAvg)return '';
  const above=val>teamAvg;
  if((isHigherGood&&above)||(isLowerGood&&!above))return 'rgba(76,175,80,.25)';
  if((isHigherGood&&!above)||(isLowerGood&&above))return 'rgba(233,69,96,.18)';
  return '';
}

function renderTable(tt){
  const data=[...getCurrentData()[tt]].sort((a,b)=>(parseInt(a.number)||0)-(parseInt(b.number)||0)),cols=tt==='batting'?BATTING_COLS:tt==='pitching'?PITCHING_COLS:FIELDING_COLS;
  const tbody=document.getElementById(tt+'Body'),total=isTotal();
  const teamAvg=total?calcTeamAvg(data,tt):{};
  tbody.innerHTML='';
  data.forEach(row=>{
    const tr=document.createElement('tr');
    const num=parseInt(row.number)||0;const gc=gradeClass(num);if(gc)tr.className='row-'+gc;
    const stats=tt==='batting'?calcBat(row):tt==='pitching'?calcPit(row):{};
    cols.forEach(col=>{
      const td=document.createElement('td');
      if(col.css)td.classList.add(col.css);
      if(col.type==='calc'){td.classList.add('col-calc');td.textContent=fmtCalc(col.key,stats[col.key]);}
      else{td.textContent=col.type==='text'?(row[col.key]||''):(row[col.key]||0);if(col.key==='name'){td.style.cursor='pointer';td.style.textDecoration='underline';td.onclick=()=>openPlayerModal(row.name);}}
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}
function renderAll(){renderHead('batting');renderHead('pitching');renderHead('fielding');renderTable('batting');renderTable('pitching');renderTable('fielding');}

function startEdit(td,tt,rid,col){
  if(isTotal())return;if(editing&&editing.td===td)return;if(editing)commitEdit();
  const lg=getLeague(activeLeague);if(!lg)return;
  const row=lg[tt].find(r=>r.id===rid);if(!row)return;
  td.classList.add('editing');
  const inp=document.createElement('input');inp.type='text';
  inp.value=col.type==='text'?(row[col.key]||''):(row[col.key]||0);
  td.textContent='';td.appendChild(inp);inp.focus();inp.select();
  editing={td,tableType:tt,rowId:rid,col,input:inp};
  inp.addEventListener('keydown',onKey);inp.addEventListener('blur',onBlur);
}
function commitEdit(){
  if(!editing)return;const{td,tableType:tt,rowId:rid,col,input:inp}=editing;
  const lg=getLeague(activeLeague);
  if(lg){const row=lg[tt].find(r=>r.id===rid);if(row){if(col.type==='text')row[col.key]=inp.value;else if(col.type==='ip')row[col.key]=sanitizeIP(inp.value);else row[col.key]=Math.max(0,parseInt(inp.value)||0);}}
  inp.removeEventListener('keydown',onKey);inp.removeEventListener('blur',onBlur);
  td.classList.remove('editing');editing=null;saveData();renderTable(tt);
}
function cancelEdit(){if(!editing)return;const{td,tableType:tt,input:inp}=editing;inp.removeEventListener('keydown',onKey);inp.removeEventListener('blur',onBlur);td.classList.remove('editing');editing=null;renderTable(tt);}
function onKey(e){
  const mk=()=>({tableType:editing.tableType,rowId:editing.rowId,col:editing.col});
  if(e.key==='Enter'){e.preventDefault();const i=mk();commitEdit();moveFocus(i,0,1);}
  else if(e.key==='Tab'){e.preventDefault();const i=mk();commitEdit();moveFocus(i,e.shiftKey?-1:1,0);}
  else if(e.key==='Escape'){e.preventDefault();cancelEdit();}
  else if(e.key==='ArrowDown'){e.preventDefault();const i=mk();commitEdit();moveFocus(i,0,1);}
  else if(e.key==='ArrowUp'){e.preventDefault();const i=mk();commitEdit();moveFocus(i,0,-1);}
}
let blurT=null;
function onBlur(){blurT=setTimeout(()=>{if(editing)commitEdit();},120);}
function moveFocus(info,cd,rd){
  if(blurT){clearTimeout(blurT);blurT=null;}if(isTotal())return;
  const lg=getLeague(activeLeague);if(!lg)return;
  const data=lg[info.tableType],cols=(info.tableType==='batting'?BATTING_COLS:info.tableType==='pitching'?PITCHING_COLS:FIELDING_COLS).filter(c=>c.type!=='calc');
  const ri=data.findIndex(r=>r.id===info.rowId),ci=cols.findIndex(c=>c.key===info.col.key);
  if(ri<0||ci<0)return;let nr=ri+rd,nc=ci+cd;
  if(nc>=cols.length){nc=0;nr++;}else if(nc<0){nc=cols.length-1;nr--;}
  if(nr<0||nr>=data.length)return;
  const tid=data[nr].id,tc=cols[nc];
  requestAnimationFrame(()=>{const td=document.querySelector(`td[data-table-type="${info.tableType}"][data-row-id="${tid}"][data-col-key="${tc.key}"]`);if(td)td.click();});
}

// ========== 選手ピッカー ==========
function openPicker(tt){
  if(isTotal())return;
  pickerTarget=tt;
  document.getElementById('pickerTitle').textContent='選手を選択（'+(tt==='batting'?'打撃':tt==='pitching'?'投手':'守備')+'）';
  document.getElementById('pickerSearch').value='';
  renderPickerCards('');
  document.getElementById('pickerOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('pickerSearch').focus(),100);
}
function closePicker(){document.getElementById('pickerOverlay').classList.remove('show');pickerTarget=null;}
function filterPicker(){renderPickerCards(document.getElementById('pickerSearch').value);}

function renderPickerCards(query){
  const body=document.getElementById('pickerBody');
  const lg=getLeague(activeLeague);if(!lg){body.innerHTML='';return;}
  const existing=new Set(lg[pickerTarget].map(r=>r.name));
  const q=query.trim().toLowerCase();
  let html='';

  ROSTER.forEach(t=>{
    t.teams.forEach(tm=>{
      const filtered=tm.players.filter(p=>{
        if(!q)return true;
        return p.name.toLowerCase().includes(q)||String(p.n).includes(q);
      });
      if(!filtered.length)return;
      html+=`<div class="picker-team-section">
        <div class="picker-team-label">${t.tournament} / ${tm.name}</div>
        <div class="picker-cards">`;
      filtered.forEach(p=>{
        const added=existing.has(p.name);
        html+=`<div class="picker-card ${gradeClass(p.n)}${added?' already-added':''}" onclick="pickPlayer(${p.n},'${p.name.replace(/'/g,"\\'")}')">
          <span class="player-num">${p.n}</span><span class="player-name">${p.name}${added?' (登録済)':''}</span></div>`;
      });
      html+=`</div></div>`;
    });
  });

  html+=`<div class="picker-manual"><button onclick="pickManual()">手動で追加</button></div>`;
  body.innerHTML=html;
}

function pickPlayer(num,name){
  if(!pickerTarget||isTotal())return;
  const lg=getLeague(activeLeague);if(!lg)return;
  const tt=pickerTarget;
  const row=tt==='batting'
    ?{id:genId(),name,number:String(num),ab:0,h:0,h2b:0,h3b:0,hr:0,rbi:0,bb:0,hbp:0,so:0,sb:0,sac:0,sf:0}
    :tt==='pitching'
    ?{id:genId(),name,number:String(num),g:0,w:0,l:0,sv:0,ip:0,ha:0,hra:0,bba:0,k:0,er:0}
    :{id:genId(),name,number:String(num),e:0};
  lg[tt].push(row);
  lg[tt].sort((a,b)=>(parseInt(a.number)||0)-(parseInt(b.number)||0));
  saveData();renderTable(tt);
  // ピッカー更新（登録済み表示）
  renderPickerCards(document.getElementById('pickerSearch').value);
}

function pickManual(){
  if(!pickerTarget||isTotal())return;
  closePicker();
  const lg=getLeague(activeLeague);if(!lg)return;
  const tt=pickerTarget;
  const row=tt==='batting'
    ?{id:genId(),name:'',number:'',ab:0,h:0,h2b:0,h3b:0,hr:0,rbi:0,bb:0,hbp:0,so:0,sb:0,sac:0,sf:0}
    :tt==='pitching'
    ?{id:genId(),name:'',number:'',g:0,w:0,l:0,sv:0,ip:0,ha:0,hra:0,bba:0,k:0,er:0}
    :{id:genId(),name:'',number:'',e:0};
  lg[tt].push(row);saveData();renderTable(tt);
  requestAnimationFrame(()=>{const td=document.querySelector(`td[data-table-type="${tt}"][data-row-id="${row.id}"][data-col-key="name"]`);if(td)td.click();});
}

// ========== 行削除 ==========
function deleteRow(tt,rid){
  if(isTotal())return;if(!confirm('この選手を削除しますか？'))return;
  if(editing&&editing.rowId===rid){editing.input.removeEventListener('keydown',onKey);editing.input.removeEventListener('blur',onBlur);editing=null;}
  const lg=getLeague(activeLeague);if(!lg)return;
  lg[tt]=lg[tt].filter(r=>r.id!==rid);saveData();renderTable(tt);
}

// ========== ランキング ==========
const RANK_CATS = [
  {key:'avg',label:'打率',type:'bat',fn:r=>{const s=calcBat(r);return s.avg;},fmt:v=>fmtRate(v),min:3,minKey:'ab'},
  {key:'ops',label:'OPS',type:'bat',fn:r=>{const s=calcBat(r);return s.ops;},fmt:v=>v!=null?v.toFixed(3):'---',min:3,minKey:'ab'},
  {key:'h',label:'安打',type:'bat',fn:r=>r.h||0,fmt:v=>v,min:0},
  {key:'rbi',label:'打点',type:'bat',fn:r=>r.rbi||0,fmt:v=>v,min:0},
  {key:'hr',label:'本塁打',type:'bat',fn:r=>r.hr||0,fmt:v=>v,min:0},
  {key:'sb',label:'盗塁',type:'bat',fn:r=>r.sb||0,fmt:v=>v,min:0},
  {key:'bb',label:'四球',type:'bat',fn:r=>r.bb||0,fmt:v=>v,min:0},
  {key:'era',label:'防御率',type:'pit',fn:r=>{const s=calcPit(r);return s.era;},fmt:v=>v!=null?v.toFixed(2):'---',min:1,minKey:'g',lower:true},
  {key:'k',label:'奪三振',type:'pit',fn:r=>r.k||0,fmt:v=>v,min:0},
  {key:'whip',label:'WHIP',type:'pit',fn:r=>{const s=calcPit(r);return s.whip;},fmt:v=>v!=null?v.toFixed(2):'---',min:1,minKey:'g',lower:true},
];
let activeRankCat = 'avg';

function renderRanking(){
  const catsEl=document.getElementById('rankingCats');
  catsEl.innerHTML='';
  RANK_CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='rank-cat'+(activeRankCat===c.key?' active':'');
    b.textContent=c.label;
    b.onclick=()=>{activeRankCat=c.key;renderRanking();};
    catsEl.appendChild(b);
  });
  const cat=RANK_CATS.find(c=>c.key===activeRankCat);
  if(!cat)return;
  const data=getTotalData();
  const src=cat.type==='bat'?data.batting:data.pitching;
  let items=src.map(r=>({name:r.name,number:r.number,val:cat.fn(r),raw:r}))
    .filter(x=>x.val!=null&&!isNaN(x.val)&&isFinite(x.val));
  if(cat.min&&cat.minKey){items=items.filter(x=>(x.raw[cat.minKey]||0)>=cat.min);}
  items.sort((a,b)=>cat.lower?(a.val-b.val):(b.val-a.val));
  const list=document.getElementById('rankList');
  if(!items.length){list.innerHTML='<div style="color:rgba(255,255,255,.4);text-align:center;padding:40px">データなし</div>';return;}
  // チーム平均計算
  const avgVal=items.length?items.reduce((s,x)=>s+x.val,0)/items.length:0;
  const maxVal=Math.max(...items.map(x=>x.val),avgVal)*1.15||1;
  const avgPct=(avgVal/maxVal)*100;
  const isLower=cat.lower||false;
  let html='';
  items.forEach((it,i)=>{
    const pos=i+1;
    const pcls=pos===1?'gold':pos===2?'silver':pos===3?'bronze':'';
    const pct=Math.max(0,Math.min(100,(it.val/maxVal)*100));
    const barCls=isLower?(it.val<avgVal?'above':it.val>avgVal?'below':'equal'):(it.val>avgVal?'above':it.val<avgVal?'below':'equal');
    html+=`<div class="rank-item" onclick="openPlayerModal('${it.name.replace(/'/g,"\\'")}')">
      <div class="rank-pos ${pcls}">${pos}</div>
      <div class="rank-bottom">
        <div class="rank-info"><div class="rank-name">${it.name}</div><div class="rank-sub">#${it.number}</div></div>
        <div class="rank-bar-row">
          <div class="rank-bar-wrap">
            <div class="rank-bar ${barCls}" style="width:${pct}%"></div>
            <div class="rank-avg-line" style="left:${avgPct}%"></div>
          </div>
          <div class="rank-val">${cat.fmt(it.val)}</div>
        </div>
      </div>
    </div>`;
  });
  list.innerHTML=html;
}

// ========== 選手詳細モーダル ==========
function getGrade(num){
  const n=parseInt(num)||0;
  if(n===10)return '3年';
  if(n>=1&&n<=15)return '3年';
  if(n>=16&&n<=54)return '2年';
  if(n>=55)return '1年';
  return '';
}
function getGradeLabel(num){
  const n=parseInt(num)||0;
  if(n===10)return '3年';
  if(n>=1&&n<=15)return '3年';
  if(n>=16&&n<=54)return '2年';
  if(n>=55)return '1年';
  return '全体';
}

function openPlayerModal(name){
  const data=getTotalData();
  const bat=data.batting.find(r=>r.name===name);
  const pit=data.pitching.find(r=>r.name===name);
  if(!bat&&!pit)return;
  const num=(bat||pit).number;
  const grade=getGrade(num);

  function mkBar(label,pv,tv,gv,maxOverride,fmt,lower){
    if(pv==null||isNaN(pv)||!isFinite(pv))return '';
    const mx=maxOverride||Math.max(pv,tv,gv,0.01)*1.3;
    const pPct=Math.max(0,Math.min(100,(pv/mx)*100));
    const tPct=Math.max(0,Math.min(100,(tv/mx)*100));
    const gPct=Math.max(0,Math.min(100,(gv/mx)*100));
    const barCls=lower?(pv<tv?'above':pv>tv?'below':'equal'):(pv>tv?'above':pv<tv?'below':'equal');
    return `<div class="pm-bar-row">
      <div class="pm-bar-label">${label}</div>
      <div class="rank-bar-wrap">
        <div class="rank-bar ${barCls}" style="width:${pPct}%"></div>
        <div class="rank-avg-line" style="left:${tPct}%"></div>
        <div class="rank-avg-line" style="left:${gPct}%;background:#2196f3"></div>
      </div>
      <div class="pm-bar-val">${fmt(pv)}</div>
    </div>`;
  }

  let html=`<div class="pm-header">
    <div><span class="pm-name">${name}</span><span class="pm-number">#${num}</span></div>
    <button class="pm-close" onclick="closePlayerModal()">×</button>
  </div>
  <div class="pm-legend">
    <div class="pm-legend-item"><div class="pm-legend-dot" style="background:#4caf50"></div>平均以上</div>
    <div class="pm-legend-item"><div class="pm-legend-dot" style="background:#e94560"></div>平均以下</div>
    <div class="pm-legend-item"><div class="pm-legend-dot" style="background:#ffd700;width:3px;border-radius:1px"></div>チーム平均</div>
    <div class="pm-legend-item"><div class="pm-legend-dot" style="background:#2196f3;width:3px;border-radius:1px"></div>${getGradeLabel(num)}平均</div>
  </div>`;

  if(bat){
    const allBat=data.batting.filter(r=>(r.ab||0)>0);
    const gradeBat=allBat.filter(r=>getGrade(r.number)===grade);
    const teamBatAvg={},gradeBatAvg={};
    ['h','h2b','h3b','hr','rbi','bb','hbp','so','sb'].forEach(k=>{
      teamBatAvg[k]=allBat.length?allBat.reduce((s,r)=>s+(r[k]||0),0)/allBat.length:0;
      gradeBatAvg[k]=gradeBat.length?gradeBat.reduce((s,r)=>s+(r[k]||0),0)/gradeBat.length:0;
    });
    const teamCalcs=allBat.map(r=>calcBat(r));
    const gradeCalcs=gradeBat.map(r=>calcBat(r));
    ['avg','obp','slg','ops'].forEach(k=>{
      const tv=teamCalcs.filter(c=>c[k]!=null);
      teamBatAvg[k]=tv.length?tv.reduce((s,c)=>s+c[k],0)/tv.length:0;
      const gv=gradeCalcs.filter(c=>c[k]!=null);
      gradeBatAvg[k]=gv.length?gv.reduce((s,c)=>s+c[k],0)/gv.length:0;
    });
    const ps=calcBat(bat);
    html+=`<div class="pm-section"><div class="pm-section-title">打撃成績</div>`;
    html+=mkBar('打率',ps.avg,teamBatAvg.avg,gradeBatAvg.avg,0.5,v=>fmtRate(v),false);
    html+=mkBar('OPS',ps.ops,teamBatAvg.ops,gradeBatAvg.ops,1.2,v=>v.toFixed(3),false);
    html+=mkBar('安打',bat.h,teamBatAvg.h,gradeBatAvg.h,0,v=>Math.round(v),false);
    html+=mkBar('打点',bat.rbi,teamBatAvg.rbi,gradeBatAvg.rbi,0,v=>Math.round(v),false);
    html+=mkBar('四球',bat.bb,teamBatAvg.bb,gradeBatAvg.bb,0,v=>Math.round(v),false);
    html+=mkBar('盗塁',bat.sb,teamBatAvg.sb,gradeBatAvg.sb,0,v=>Math.round(v),false);
    html+=mkBar('三振',bat.so,teamBatAvg.so,gradeBatAvg.so,0,v=>Math.round(v),true);
    html+=`</div>`;
  }

  if(pit){
    const pps=calcPit(pit);
    const allPit=data.pitching.filter(r=>(r.g||0)>0);
    const gradePit=allPit.filter(r=>getGrade(r.number)===grade);
    const teamPitAvg={},gradePitAvg={};
    ['k','er','bba','ha'].forEach(k=>{
      teamPitAvg[k]=allPit.length?allPit.reduce((s,r)=>s+(r[k]||0),0)/allPit.length:0;
      gradePitAvg[k]=gradePit.length?gradePit.reduce((s,r)=>s+(r[k]||0),0)/gradePit.length:0;
    });
    const tcalcs=allPit.map(r=>calcPit(r)).filter(c=>c.era!=null);
    const gcalcs=gradePit.map(r=>calcPit(r)).filter(c=>c.era!=null);
    teamPitAvg.era=tcalcs.length?tcalcs.reduce((s,c)=>s+c.era,0)/tcalcs.length:0;
    gradePitAvg.era=gcalcs.length?gcalcs.reduce((s,c)=>s+c.era,0)/gcalcs.length:0;
    teamPitAvg.whip=tcalcs.length?tcalcs.reduce((s,c)=>s+c.whip,0)/tcalcs.length:0;
    gradePitAvg.whip=gcalcs.length?gcalcs.reduce((s,c)=>s+c.whip,0)/gcalcs.length:0;

    html+=`<div class="pm-section"><div class="pm-section-title">投手成績</div>`;
    html+=mkBar('防御率',pps.era,teamPitAvg.era,gradePitAvg.era,0,v=>v.toFixed(2),true);
    html+=mkBar('WHIP',pps.whip,teamPitAvg.whip,gradePitAvg.whip,0,v=>v.toFixed(2),true);
    html+=mkBar('奪三振',pit.k,teamPitAvg.k,gradePitAvg.k,0,v=>Math.round(v),false);
    html+=`</div>`;
  }

  document.getElementById('playerModalContent').innerHTML=html;
  document.getElementById('playerModal').classList.add('show');
}
function closePlayerModal(){document.getElementById('playerModal').classList.remove('show');}

window.addEventListener('load',()=>{
  loadData();
  renderRoster();
  renderAll();
});
